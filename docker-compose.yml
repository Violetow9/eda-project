services:
  postgresql:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - api-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgresql
    volumes:
      - ./taskflow-api:/app
      - api_node_modules:/app/node_modules
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - api-db
      - web-api

  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    environment:
      PORT: ${WEB_PORT:-3001}
      API_INTERNAL_URL: http://api:${PORT:-3000}
    volumes:
      - ./taskflow-web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "${WEB_PORT:-3001}:${WEB_PORT:-3001}"
    depends_on:
      - api
    networks:
      - web-api

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025" 
    networks:
      - web-api

networks:
  api-db:
    driver: bridge
  web-api:
    driver: bridge

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:
