services:
  postgresql:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api-db

  api:
    build:
      context: ./taskflow-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${API_PORT:-3000}
      DATABASE_HOST: postgresql
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      - postgresql
    networks:
      - api-db
      - web-api

  web:
    build:
      context: ./taskflow-web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${WEB_PORT:-3001}
      API_INTERNAL_URL: http://api:${API_PORT:-3000}
    ports:
      - "${WEB_PORT:-3001}:3001"
    depends_on:
      - api
    networks:
      - web-api

networks:
  api-db:
    driver: bridge
  web-api:
    driver: bridge

volumes:
  postgres_data: